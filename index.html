<!DOCTYPE html>
<html>
<head>
<title>ChroniRadio</title>
<meta charset="utf-8">
<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY LAYOUT ===== */
body {
    font-family: Georgia, serif;
    background: #f4f4f2;
    color: #111;
    text-align: center;
    padding: 80px 20px;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
}

/* ===== TYPOGRAPHY ===== */
h1 {
    font-size: 4rem;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

h2 {
    font-size: 1rem;
    letter-spacing: 5px;
    color: #777;
    margin-bottom: 40px;
}

p {
    max-width: 600px;
    margin: 20px auto;
    line-height: 1.6;
}

a {
    display: inline-block;
    margin: 15px;
    text-decoration: none;
    color: #111;
    border-bottom: 1px solid #111;
    transition: 0.3s;
}

a:hover {
    letter-spacing: 2px;
}

/* ===== MEDIA ===== */
audio, video {
    margin: 30px auto;
    display: block;
}
</style>
</head>
